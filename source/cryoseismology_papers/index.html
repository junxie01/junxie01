<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>冰川地震学论文搜索系统</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧊 冰川地震学论文周报</h1>
            <p>自动搜索和分析与 icequake、glacier、seismology、冰川地震学相关的最新论文</p>
        </header>

        <div class="search-section">
            <div class="keywords-input">
                <label>追踪关键词：</label>
                <div id="keywords-container">
                    <span class="keyword-tag">icequake</span>
                    <span class="keyword-tag">glacier</span>
                    <span class="keyword-tag">seismology</span>
                    <span class="keyword-tag">冰川地震学</span>
                </div>
            </div>
            <p style="color: #666; font-size: 0.9rem;">🔄 每周日自动更新 | 最后更新: <span id="last-update">-</span></p>
        </div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <p>正在加载数据...</p>
        </div>

        <div id="papers-list" class="papers-list"></div>

        <div id="paper-modal" class="modal hidden">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title"></h2>
                    <button id="close-modal" class="close-btn">&times;</button>
                </div>
                <div id="modal-body" class="modal-body"></div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
